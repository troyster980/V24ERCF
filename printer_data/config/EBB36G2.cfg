# This file contains common pin mappings for the BIGTREETECH EBB36
# GEN2 board. To use this config, the firmware should be compiled for the
# STM32G0B1 with "8 MHz crystal" and "USB (on PA11/PA12)" or "CAN bus (on PB12/PB13)" .
# The "EBB36 GEN2" micro-controller will be used to control the components on the nozzle.

# See docs/Config_Reference.md for a description of parameters.

[mcu EBB]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_EBB36_GEN-if00
#canbus_uuid=a62a88bb28e3

[temperature_sensor EBB36]
sensor_type: Generic 3950
sensor_pin: EBB:PA0
pullup_resistor: 2200

#[lis2dw]
#cs_pin: EBB:PB1
#spi_bus:spi2_PB2_PB11_PB10
#axes_map: x,y,z

[extruder]
step_pin: EBB:PB14
dir_pin: EBB:PA8
enable_pin: !EBB:PB6
microsteps: 16
rotation_distance: 47.088
gear_ratio: 9:1
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBB:PB4
sensor_type: ATC Semitec 104NT-4-R025H42G
pullup_resistor: 2200
sensor_pin: EBB:PA3
control: pid
pid_Kp: 21.527
pid_Ki: 1.063
pid_Kd: 108.982
min_temp: 0
max_temp: 290

[tmc2209 extruder]
uart_pin: EBB:PB3
run_current: 0.600
stealthchop_threshold: 999999

#[filament_switch_sensor fil_det]
#switch_pin: EBB:PD0

[multi_pin my_controller_fan_pins]
pins: EBB:PD3, EBB:PA5

[fan]
pin: multi_pin:my_controller_fan_pins

#[heater_fan hotend_fan]
#pin: EBB:PA5


[heater_fan 3w_fan2]
pin: EBB:PD2
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 50.0
tachometer_pin: EBB:PA4
tachometer_poll_interval: 0.00015


#####################################################################
# 	ERCF toolhead Sensor
#####################################################################

[filament_switch_sensor toolhead_sensor]
pause_on_runout: False
# filament sensor wired to the printer MCU
switch_pin: EBB:PA15
[filament_switch_sensor entry_sensor]
pause_on_runout: False
# filament sensor wired to the printer MCU
switch_pin: EBB:PD0

